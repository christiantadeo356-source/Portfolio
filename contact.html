<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Christian Tadeo - Get in touch for questions, suggestions, or just to say hi.">
    <meta name="keywords" content="Christian Tadeo, contact, portfolio, get in touch">
    <meta name="author" content="Christian Tadeo">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <title>Contact Me | Christian T.</title>
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="ewaewaewae-removebg-preview.png" alt="Christian T. Logo" class="logo">
        </div>
        <h1>Contact Me Here</h1>
        <img src="prof.webp" alt="Christian T. Profile Photo" class="profile-photo" />
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="blog.html">Blog Posts</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h2>Contact Me</h2>
            <p>Have a question, suggestion, or just want to say hi? Send me a message below:</p>

            <form action="#" method="post" class="contact-form" id="contactForm">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required />

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required />

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>

                <button type="submit"><i class="fas fa-paper-plane"></i> Send Message</button>

                <div class="form-status" id="formStatus"></div>
            </form>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/christianjames.tadeo.3" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://kick.com" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-play"></i> Kick
            </a>
            <a href="https://www.instagram.com/siijy_tian/" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i> Instagram
            </a>
        </div>
        <p>&copy; 2025 Christian T. | All rights reserved.</p>
    </footer>

    <script>
        const contactForm = document.getElementById('contactForm');
        const formStatus = document.getElementById('formStatus');

        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            // Simple validation
            if (!name || !email || !message) {
                formStatus.className = 'form-status error';
                formStatus.textContent = 'Please fill in all fields.';
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                formStatus.className = 'form-status error';
                formStatus.textContent = 'Please enter a valid email address.';
                return;
            }

            // Simulate sending (no backend yet)
            const btn = contactForm.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            setTimeout(() => {
                formStatus.className = 'form-status success';
                formStatus.innerHTML = '<i class="fas fa-check-circle"></i> Thanks for reaching out, ' + name + '! I\'ll get back to you soon.';
                contactForm.reset();
                btn.innerHTML = originalText;
                btn.disabled = false;

                // Clear success message after 5 seconds
                setTimeout(() => {
                    formStatus.className = 'form-status';
                    formStatus.textContent = '';
                }, 5000);
            }, 1500);
        });
    </script>
</body>

</html>
